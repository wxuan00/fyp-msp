<div class="page-container">
  <div class="page-header">
    <div>
      <h1>Edit Profile</h1>
      <div class="breadcrumb">Account › Profile › Edit</div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3>Update Your Information</h3>
    </div>
    <form (ngSubmit)="onSave()">

      <div *ngIf="errorMessage" class="form-error-banner">⚠️ {{ errorMessage }}</div>
      <div class="form-grid">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" class="form-control" [(ngModel)]="profile.firstName" name="firstName" required>
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text" class="form-control" [(ngModel)]="profile.lastName" name="lastName" required>
        </div>

        <div class="form-group">
          <label>Display Name</label>
          <input type="text" class="form-control" [(ngModel)]="profile.displayName" name="displayName">
        </div>

        <div class="form-group">
          <label>Contact Number</label>
          <input type="tel" class="form-control" [(ngModel)]="profile.contactNumber" name="contactNumber">
        </div>
      </div>

      <div class="form-actions">
        <button type="button" (click)="cancel()" class="btn btn-secondary">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>
